<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>News Explorer</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <main class="container">
        <header class="search-header">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="search-input" placeholder="Search for News" />
            </div>
        </header>
        <section class="dashboard">
            <h1>Top stories for you</h1>
            <nav class="tags-container" id="tags-container">
                <button class="tag active" data-value="all">All</button>
                <button class="tag" data-value="business">Business</button>
                <button class="tag" data-value="politics">Politics</button>
                <button class="tag" data-value="sports">Sports</button>
                <button class="tag" data-value="entertainment">Entertainment</button>
            </nav>
            <div class="news-grid" id="news-grid">
            </div>
            <div class="actions">
                <button id="show-more-btn" class="show-more-btn hidden">Show More</button>
            </div>
        </section>
    </main>
    <script type="module" src="script.js"></script>
</body>

</html>
